<head>

  />
  <meta name="application-name" content="Jinrō Nova" />
  <meta name="apple-mobile-web-app-title" content="Jinrō Nova" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#16171d" media="(prefers-color-scheme: dark)" />
  <link rel="manifest" href="%BASE_URL%site.webmanifest" />

  <meta property="og:type" content="website" />
  <meta property="og:locale" content="fr_FR" />
  <meta property="og:title" content="Jinrō 人狼 - Jeu de rôle Nova" />
  <meta
    property="og:description"
    content="Bluff, stratégie et déduction au scrum matinal : faites avancer le modèle critique, ou sabotez l'équipe en secret."
  />
  <meta property="og:image" content="%BASE_URL%jinrou_dark_180x180.png" />

  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Jinrō 人狼 - Jeu de rôle Nova" />

    name="twitter:description"
    content="Un jeu de rôle façon Loup-garou dans l'univers Nova, entre modèle critique, sabotage secret et accusations au scrum."
  />

  <link id="favicon" rel="icon" type="image/svg+xml" href="%BASE_URL%favicon_light.svg" />

  <link rel="alternate icon" type="image/png" sizes="32x32" href="%BASE_URL%jinrou_light_32x32.png"
    media="(prefers-color-scheme: light)" />

  <link rel="alternate icon" type="image/png" sizes="32x32" href="%BASE_URL%jinrou_dark_32x32.png"
    media="(prefers-color-scheme: dark)" />

  <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%jinrou_dark_180x180.png" />

  <script>
    const favicon = document.getElementById('favicon')
    const darkModeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)')
    const baseUrl = '%BASE_URL%'

    function updateFavicon() {
      favicon.href = darkModeMediaQuery.matches
        ? `${baseUrl}favicon_dark.svg`
        : `${baseUrl}favicon_light.svg`
    }

    darkModeMediaQuery.addEventListener('change', updateFavicon)
    updateFavicon()
  </script>
